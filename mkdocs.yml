site_name: Everything Claude Code 中文教程
site_url: https://Chasen-Liao.github.io/Everything-claude-code-Doc/
site_description: ECC（Everything Claude Code）的中文教程镜像与导读
repo_url: https://github.com/Chasen-Liao/Everything-claude-code-Doc
repo_name: Chasen-Liao/Everything-claude-code-Doc
edit_uri: edit/main/docs/

docs_dir: docs
exclude_docs: |
  superpowers/**
  everything-claude-code/**

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到深色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到浅色
  font:
    text: Noto Sans SC
    code: JetBrains Mono

plugins:
  - search:
      lang:
        - zh
        - en
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.smartsymbols
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - assets/extra.css

nav:
  - 首页: index.md
  - 入门:
      - ECC 是什么: getting-started/what-is-ecc.md
      - 适合谁看: getting-started/who-is-this-for.md
      - 快速开始: getting-started/quickstart.md
  - 核心概念:
      - 总览: concepts/overview.md
      - 组件:Agent/Skill/Command: concepts/agent-vs-skill-vs-command.md
      - 常见误解: concepts/misconceptions.md
  - 阅读路线: routes/index.md
  - 命令速查:
      - 总览: commands/index.md
      - 最常用: commands/most-used.md
      - 按场景: commands/by-scenario.md
      - 按语言: commands/by-language.md
      - 工作流示例: commands/workflow-examples.md
  - 上游副本导航:
      - 总览: upstream-navigation/index.md
      - 按目录: upstream-navigation/by-directory.md
  - 维护:
      - 与上游同步: maintenance/sync-upstream.md
  - 常见问题: faq.md